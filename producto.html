    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

            </div>
            <div class="nav-menu">
                <div class="dropdown">
                    <a href="#" class="nav-link dropdown-toggle">Productos</a>
                    <div class="dropdown-menu">
                        <a href="remeras.html" class="dropdown-item">Remeras</a>
                        <a href="hoodies.html" class="dropdown-item">Hoodies</a>
                        <a href="pantalones.html" class="dropdown-item">Pantalones</a>
                        <a href="accesorios.html" class="dropdown-item">Accesorios</a>
                        <a href="todos.html" class="dropdown-item">Todos</a>
                    </div>

            </div>
            <div class="nav-cta">
                <div class="cart-icon-container">
                    <a href="carrito.html" class="cart-btn">

                    </a>

    <!-- PRODUCT PAGE -->
    <main class="product-page">
        <div class="container">
            <div class="product-layout" id="productLayout">
                <!-- El contenido del producto se cargará dinámicamente aquí -->
            </div>
        </div>
    </main>

    <!-- BANNER FINAL + FOOTER -->
    <section class="banner-footer">
        <div class="banner-footer-image">
            <img src="fotos banner/00c0aee0a97f57137954698fd0cfed4a.jpg" alt="Banner Final">
            <div class="banner-footer-overlay">
                <div class="banner-footer-content">
                    <p>DESDE EL MINUTO 0</p>
                    <div class="footer-info">
                        <div class="footer-contact">
                            <h3>Contacto</h3>
                            <a href="https://wa.me/5491127641124" target="_blank" class="whatsapp-link">
                                WhatsApp: +54 9 112764-1124
                            </a>
                        </div>
                        <div class="footer-social">
                            <h3>Redes</h3>
                            <a href="https://instagram.com/the.pavilions32" target="_blank">Instagram</a>
                            <a href="https://youtube.com/@THEPAVILIONS32" target="_blank">YouTube</a>
                        </div>
                    </div>
                    <div class="footer-bottom">
                        <p>&copy; 2024 Todos los derechos reservados.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <style>
        /* BOTÓN CONSULTAR */
        .product-actions {
            text-align: center;
        }

        .add-to-cart-btn {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .add-to-cart-btn:hover:not(:disabled) {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .add-to-cart-btn:disabled {
            background: #cccccc;
            color: #999999;
            cursor: not-allowed;
            transform: none;
        }

        /* BOTONES DE TALLE */
        .size-btn:disabled {
            background: #f5f5f5 !important;
            color: #cccccc !important;
            border: 2px solid #e0e0e0 !important;
            cursor: not-allowed !important;
            opacity: 0.5 !important;
            transform: none !important;
        }

        .size-btn:disabled:hover {
            background: #f5f5f5 !important;
            transform: none !important;
            opacity: 0.5 !important;
        }
    </style>

    <script src="js/app.js"></script>
    <script>
        let selectedSize = null;
        let currentImageIndex = 0;
        let currentProduct = null;

        // Cargar producto desde localStorage
        function loadProduct() {
            console.log('=== INICIANDO CARGA DE PRODUCTO ===');
            
            // Obtener ID del producto del URL
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            console.log('ID del producto del URL:', productId);
            
            if (!productId) {
                console.log('❌ No hay ID de producto en el URL, redirigiendo...');
                window.location.href = 'index.html';
                return;
            }

            // Buscar el producto en localStorage
            const allProducts = JSON.parse(localStorage.getItem('pavilions_products') || '[]');
            console.log('Todos los productos:', allProducts);
            
            currentProduct = allProducts.find(product => product.id === productId);
            console.log('Producto encontrado:', currentProduct);
            
            if (!currentProduct) {
                console.log('❌ Producto no encontrado, redirigiendo...');
                window.location.href = 'index.html';
                return;
            }
            
            console.log('✅ Producto cargado exitosamente:', currentProduct);
            
            // Verificar que el producto tenga los datos necesarios
            if (!currentProduct || !currentProduct.nombre) {
                console.log('❌ El producto no tiene datos válidos');
                window.location.href = 'index.html';
                return;
            }
            
            console.log('🎯 Producto válido, renderizando...');
            renderProduct();
        }

        // Renderizar el producto dinámicamente
        function renderProduct() {
            const layout = document.getElementById('productLayout');
            if (!layout || !currentProduct) {
                console.log('❌ No hay layout o producto');
                return;
            }

            console.log('🎨 Renderizando producto:', currentProduct);

            // Obtener imágenes del producto
            const images = getProductImages();
            console.log('📷 Imágenes del producto:', images);
            
            // Generar HTML del producto
            layout.innerHTML = `
                <!-- GALERÍA DE IMÁGENES -->
                <div class="product-gallery">
                    <div class="main-image">
                        <img src="${images[0]}" alt="${currentProduct.nombre}" id="mainImage">
                    </div>
                    ${images.length > 1 ? `
                    <div class="thumbnail-slider">
                        <button class="thumb-arrow prev" onclick="changeImage(-1)">←</button>
                        <div class="thumbnails">
                            ${images.map((img, index) => `
                                <div class="thumbnail ${index === 0 ? 'active' : ''}" onclick="setMainImage('${img}', this)">
                                    <img src="${img}" alt="Imagen ${index + 1}">
                                </div>
                            `).join('')}
                        </div>
                        <button class="thumb-arrow next" onclick="changeImage(1)">→</button>
                    </div>
                    ` : ''}
                </div>

                <!-- INFORMACIÓN DEL PRODUCTO -->
                <div class="product-info">
                    <h1 class="product-name">${currentProduct.nombre || 'Sin nombre'}</h1>
                    <p class="product-description">${currentProduct.descripcion || 'Producto de T PAVILIONS'}</p>
                    
                    <!-- PRECIO -->
                    <div class="product-price">
                        <h3>Precio</h3>
                        <p class="price">${currentProduct.precio ? `$${currentProduct.precio.toLocaleString('es-AR')}` : 'Consultar precio'}</p>
                    </div>

                    <!-- CATEGORÍA -->
                    <div class="product-category">
                        <h3>Categoría</h3>
                        <p>${currentProduct.categoria || 'Sin categoría'}</p>
                    </div>

                    <!-- STOCK -->
                    <div class="product-stock">
                        <h3>Stock disponible</h3>
                        <p>${getStockText()}</p>
                    </div>

                    <!-- SELECTOR DE TALLE -->
                    <div class="size-selector">
                        <h3>Talle</h3>
                        <div class="size-options">
                            ${generateSizeOptions()}
                        </div>
                        <p class="size-error" id="sizeError" style="display: none; color: red; font-size: 12px; margin-top: 5px;">
                            Por favor selecciona un talle
                        </p>
                    </div>

                    <!-- BOTÓN AGREGAR AL CARRITO -->
                    <div class="product-actions">
                        <button class="add-to-cart-btn" id="addToCartBtn" disabled onclick="addToCartFromProduct()">
                            AGREGAR AL CARRITO
                        </button>
                        <p class="cart-info">Selecciona un talle para agregar al carrito</p>
                    </div>
                </div>
            `;
            
            console.log('✅ Producto renderizado exitosamente');
        }

        // Obtener imágenes del producto
        function getProductImages() {
            if (!currentProduct) return ['https://via.placeholder.com/600x800?text=Sin+producto'];
            
            if (currentProduct.fotos && currentProduct.fotos.length > 0) {
                return currentProduct.fotos.map(foto => foto.data);
            } else if (currentProduct.foto) {
                return [currentProduct.foto];
            }
            return ['https://via.placeholder.com/600x800?text=Sin+imagen'];
        }

        // Generar opciones de talle
        function generateSizeOptions() {
            if (!currentProduct || !currentProduct.stock) {
                return '<p>No hay información de talles disponible</p>';
            }
            
            if (currentProduct.tipoTalle === 'unico') {
                const stockUnico = currentProduct.stock.unico || 0;
                const disabled = stockUnico === 0 ? 'disabled' : '';
                return `<button class="size-btn" onclick="selectSize('unico', this)" ${disabled}>Talle Único</button>`;
            } else {
                const talles = ['S', 'M', 'L', 'XL'];
                return talles.map(talle => {
                    const stock = currentProduct.stock[talle] || 0;
                    const disabled = stock === 0 ? 'disabled' : '';
                    return `<button class="size-btn" onclick="selectSize('${talle}', this)" ${disabled}>${talle}</button>`;
                }).join('');
            }
        }

        // Obtener texto de stock
        function getStockText() {
            if (!currentProduct || !currentProduct.stock) {
                return 'Sin información de stock';
            }
            
            if (currentProduct.tipoTalle === 'unico') {
                return `Talle único: ${currentProduct.stock.unico || 0} unidades`;
            } else {
                const stockInfo = [];
                ['S', 'M', 'L', 'XL'].forEach(talle => {
                    const stock = currentProduct.stock[talle] || 0;
                    if (stock > 0) {
                        stockInfo.push(`${talle}: ${stock} unidades`);
                    }
                });
                return stockInfo.length > 0 ? stockInfo.join(', ') : 'Sin stock';
            }
        }

        function selectSize(size, element) {
            selectedSize = size;
            
            // Actualizar botones
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            element.classList.add('active');
            
            // Ocultar error si estaba visible
            const sizeError = document.getElementById('sizeError');
            if (sizeError) {
                sizeError.style.display = 'none';
            }
            
            // Habilitar botón de agregar al carrito
            const addToCartBtn = document.getElementById('addToCartBtn');
            if (addToCartBtn) {
                addToCartBtn.disabled = false;
            }
        }

        function setMainImage(imageSrc, element) {
            const mainImage = document.getElementById('mainImage');
            if (mainImage) {
                mainImage.src = imageSrc;
            }
            
            // Actualizar thumbnail activa
            document.querySelectorAll('.thumbnail').forEach(thumb => {
                thumb.classList.remove('active');
            });
            element.classList.add('active');
            
            // Actualizar índice
            const images = getProductImages();
            currentImageIndex = images.indexOf(imageSrc);
        }

        function changeImage(direction) {
            const images = getProductImages();
            currentImageIndex += direction;
            
            if (currentImageIndex < 0) {
                currentImageIndex = images.length - 1;
            } else if (currentImageIndex >= images.length) {
                currentImageIndex = 0;
            }
            
            updateMainImage();
            
            // Actualizar thumbnail activa
            document.querySelectorAll('.thumbnail').forEach((thumb, index) => {
                thumb.classList.toggle('active', index === currentImageIndex);
            });
        }

        function updateMainImage() {
            const images = getProductImages();
            const mainImage = document.getElementById('mainImage');
            if (mainImage && images[currentImageIndex]) {
                mainImage.src = images[currentImageIndex];
            }
        }

        function addToCartFromProduct() {
            if (!selectedSize) {
                const sizeError = document.getElementById('sizeError');
                if (sizeError) {
                    sizeError.style.display = 'block';
                }
                return;
            }
            
            console.log('🛒 Agregando al carrito desde página de producto'); // Debug
            console.log('Producto:', currentProduct.nombre); // Debug
            console.log('Talle seleccionado:', selectedSize); // Debug
            
            // Crear item del carrito con el talle seleccionado
            const cartItem = {
                productId: currentProduct.id,
                nombre: currentProduct.nombre,
                precio: currentProduct.precio,
                foto: currentProduct.foto || (currentProduct.fotos && currentProduct.fotos.length > 0 ? currentProduct.fotos[0].data : ''),
                quantity: 1,
                categoria: currentProduct.categoria,
                talleSeleccionado: selectedSize
            };
            
            // Agregar al carrito usando el sistema global
            if (typeof cartManager !== 'undefined') {
                cartManager.addToCartWithSize(currentProduct.id, selectedSize);
            } else {
                // Fallback si cartManager no está disponible
                let cart = JSON.parse(localStorage.getItem('pavilions_cart') || '[]');
                const existingItem = cart.find(item => item.productId === currentProduct.id && item.talleSeleccionado === selectedSize);
                
                if (existingItem) {
                    existingItem.quantity += 1;
                } else {
                    cart.push(cartItem);
                }
                
                localStorage.setItem('pavilions_cart', JSON.stringify(cart));
                showToast(`${currentProduct.nombre} (${selectedSize}) agregado al carrito 🛒`, 'success');
            }
        }

        // Cargar producto al iniciar la página
        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
</body>
</html>
